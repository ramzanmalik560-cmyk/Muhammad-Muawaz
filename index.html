<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Translator</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ── NAV ── -->
  <nav class="navbar">
    <div class="nav-inner">
      <div class="nav-logo">
        <div class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path
              d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0014.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"
              fill="white" />
          </svg>
        </div>
        <span>Translator</span>
      </div>
      <div class="nav-status" id="navStatus">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusLabel">Checking…</span>
      </div>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <main class="main">
    <div class="container">

      <!-- Page title -->
      <div class="page-title">
        <h1>Language Translator</h1>
        <p>Translate text into 20+ languages instantly</p>
      </div>

      <!-- Language selector row -->
      <div class="lang-row">

        <div class="lang-box">
          <label class="lang-label">From</label>
          <select class="lang-select" id="sourceLang"></select>
        </div>

        <button class="swap-btn" id="swapBtn" title="Swap languages">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>

        <div class="lang-box">
          <label class="lang-label">To</label>
          <select class="lang-select" id="targetLang"></select>
        </div>

      </div>

      <!-- Quick language chips -->
      <div class="chips-row">
        <span class="chips-label">Quick select:</span>
        <div class="chips" id="chips"></div>
      </div>

      <!-- Translation area -->
      <div class="translate-grid">

        <!-- Input card -->
        <div class="t-card">
          <div class="t-card-header">
            <span class="t-card-title">Input</span>
            <div class="t-card-actions">
              <button class="action-btn" id="pasteBtn" title="Paste text">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                  <path
                    d="M9 2h6a1 1 0 011 1v1H8V3a1 1 0 011-1zM4 5h16a1 1 0 011 1v14a1 1 0 01-1 1H4a1 1 0 01-1-1V6a1 1 0 011-1z"
                    stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                </svg>
                Paste
              </button>
              <button class="action-btn" id="micBtn" title="Voice input">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                  <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z" stroke="currentColor" stroke-width="1.8" />
                  <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8" stroke="currentColor" stroke-width="1.8"
                    stroke-linecap="round" />
                </svg>
                Voice
              </button>
              <button class="action-btn" id="clearBtn" title="Clear text">Clear</button>
            </div>
          </div>
          <textarea id="inputText" class="t-textarea" placeholder="Type or paste your text here…"
            maxlength="1000"></textarea>
          <div class="t-card-footer">
            <span id="charCount" class="char-count">0 / 1000</span>
          </div>
        </div>

        <!-- Output card -->
        <div class="t-card t-card--output">
          <div class="t-card-header">
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="t-card-title">Translation</span>
              <span class="detected-badge" id="detectedBadge"></span>
            </div>
            <div class="t-card-actions">
              <button class="action-btn" id="copyBtn" title="Copy translation">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                  <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8" />
                  <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor"
                    stroke-width="1.8" />
                </svg>
                Copy
              </button>
              <button class="action-btn" id="speakBtn" title="Read aloud">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                  <path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"
                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
                Listen
              </button>
            </div>
          </div>
          <div class="t-output" id="outputText">
            <span class="t-placeholder">Translation will appear here…</span>
          </div>
          <div class="t-card-footer">
            <span id="outputInfo" class="output-info"></span>
          </div>
        </div>

      </div>

      <!-- Translate button -->
      <div class="btn-row">
        <button class="btn-translate" id="translateBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
          Translate
        </button>
      </div>

      <!-- Error / info message -->
      <div class="msg-box" id="msgBox"></div>

    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>

</html>
